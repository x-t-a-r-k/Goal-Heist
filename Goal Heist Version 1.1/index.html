<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goal Heist</title>
    
    <!-- Google Fonts: Lexend for headings, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Lexend', 'sans-serif'],
            },
            colors: {
              heist: {
                green: '#22c55e', // Green-500: A strong winning green
                dark: '#0f0f0f',
                card: '#1a1a1a',
                border: '#333333'
              }
            },
            animation: {
              'glow-pulse': 'glow-pulse 1.5s infinite ease-in-out',
              'slide-down': 'slide-down 0.3s ease-out forwards',
            },
            keyframes: {
              'glow-pulse': {
                '0%, 100%': { boxShadow: '0 0 5px rgba(34, 197, 94, 0.2)', backgroundColor: 'rgba(34, 197, 94, 0.8)' },
                '50%': { boxShadow: '0 0 25px rgba(34, 197, 94, 0.8)', backgroundColor: 'rgba(34, 197, 94, 1)' },
              },
              'slide-down': {
                '0%': { transform: 'translateY(-100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    
    <style>
      /* Aggressively hide scrollbar for all elements */
      *, ::before, ::after {
        scrollbar-width: none !important; /* Firefox */
        -ms-overflow-style: none !important;  /* IE and Edge */
      }
      
      /* Chrome, Safari and Opera */
      *::-webkit-scrollbar {
        display: none !important;
        width: 0 !important;
        height: 0 !important;
      }

      .preview-blur {
        backdrop-filter: blur(8px);
        background-color: rgba(0, 0, 0, 0.7);
      }
    </style>

    <!-- html2canvas for snapshot functionality -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-heist-dark text-white font-sans antialiased overflow-x-hidden selection:bg-heist-green selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
